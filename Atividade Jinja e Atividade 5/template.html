<!-- Questão 1 -->
<p>Olá, {{ nome }}</p>

<hr>

<!-- Questão 2 -->
<p>Nome: {{ nome }}</p>
<p>Idade: {{ idade }} anos</p>

<hr>

<!-- Questão 3 -->
<p>Usuário: {{ usuario.nome }} ({{ usuario.email }})</p>

<hr>

<!-- Questão 4 -->
<ul>
    {% for aluno in alunos %}
        <li>{{ aluno }}</li>
    {% endfor %}
</ul>

<hr>

<!-- Questão 5 -->
<p>Status do aluno: 
    {% if nota >= 7 %}
        Aprovado
    {% else %}
        Reprovado
    {% endif %}
</p>
